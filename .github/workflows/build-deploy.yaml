name: Build-and-deploy code
on: [push, pull_request] #when should it run, it should run when..., can specify multiple events or use the commented method
  #push:
    #branches: ["main"] #when code is pushed to main branch
  #pull_request:
    #branches: ["main"] #can do it like this
    #- "main", can also do it like this
jobs:
  build: #name of the job
    environment: 
      name: testing
    env:
      DATABASE_HOSTNAME: ${{ secrets.DATABASE_HOSTNAME }}
      DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
    services:
      postgres:
        image: postgres #can specify version too like postgres:13, not specifying uses the latest version
        env:
          POSTGRES_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DATABASE_NAME }}_test
        ports:
          - 5432:5432 #ports have to be hardcoded here, cant use env variables
        options: >- #important to use >- here for multiline strings, the > means new lines will be converted to spaces and - means trailing new line will be removed
          --health-cmd pg_isready 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    steps:
      - name: pulling git repo
        uses: actions/checkout@v2
      #- name: run some command
        #run: echo "Building the code..." or you can ,'sudo apt get install' whatever you want
      - name: Set up Python version 3.13
        uses: actions/setup-python@v2
        with:
          python-version: '3.13'
      - name: update pip
        run: python -m pip install --upgrade pip
      - name: Install dependencies
        run: | #used pipe here wrongly though cos its only one command but because i put the command on a new line, had to use the pipe
          pip install -r requirements.txt
      - name: Run tests
        run: | #this pipe is used if you want to run multiple commands
          pip install pytest
          pytest

      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          context: ./
          file: ./Dockerfile
          builder: ${{ steps.buildx.outputs.name }}
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/fastapi:latest # should match this 'stephanek1993/fastapi:tagname' , got this command from my dockerhub repo for fastapi
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy: #second job to push the changes made in build to production. first job was build.
    needs: build #because github actions runs all jos in parallel by default(at the same time), this line makes sure deploy job runs only after build job is complete
    runs-on: ubuntu-latest
    environment:
      name: production
      #url: http://your-production-url.com  # replace with your production URL
    steps:
      - name: pulling git repo
        uses: actions/checkout@v2
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install-ubuntu.sh | sh
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }} #must be unique name across heroku
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          
      - name: Deploy to ubuntu server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          password: ${{ secrets.PROD_PASSWORD }}
          script: |
            cd app/src
            git pull
            echo ${{ secrets.SUDO_PASSWORD }} | sudo -S systemctl restart api 
          
